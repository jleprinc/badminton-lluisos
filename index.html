<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bàdminton — Calendari</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --green:#1a6b4a; --green-light:#e8f5ef; --green-mid:#4caf82;
    --green-pale:#f0faf5; --ink:#1a1f1c; --ink2:#4a5450;
    --ink3:#8a9490; --border:#d8e8e0; --white:#ffffff; --court:#2d5a3d;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);min-height:100vh}

  /* HERO */
  .hero{background:var(--court);color:white;padding:3rem 2rem 4rem;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 60px),
               repeating-linear-gradient(90deg,transparent,transparent 59px,rgba(255,255,255,0.04) 59px,rgba(255,255,255,0.04) 60px)}
  .hero-inner{position:relative;z-index:1;max-width:600px;margin:0 auto}
  .shuttle-icon{font-size:2.5rem;margin-bottom:1rem;display:block}
  .hero h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:400;letter-spacing:-0.02em;line-height:1.1;margin-bottom:0.5rem}
  .hero p{color:rgba(255,255,255,0.65);font-size:0.95rem;font-weight:300}

  /* HERO TOP BAR */
  .hero-bar{position:absolute;top:1rem;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;z-index:10}
  .lang-toggle{display:flex;border:1px solid rgba(255,255,255,0.3);border-radius:8px;overflow:hidden}
  .lang-btn{padding:5px 11px;font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;letter-spacing:0.04em;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,0.55);transition:all 0.15s}
  .lang-btn.active{background:rgba(255,255,255,0.2);color:white}
  .lang-btn:hover:not(.active){color:rgba(255,255,255,0.85)}
  .new-cal-btn-hero{display:none;align-items:center;gap:6px;padding:5px 12px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;background:transparent;color:rgba(255,255,255,0.75);font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:500;cursor:pointer;transition:all 0.15s}
  .new-cal-btn-hero:hover{background:rgba(255,255,255,0.15);color:white}
  .new-cal-btn-hero.visible{display:inline-flex}

  /* UPLOAD */
  #upload-screen{max-width:520px;margin:3rem auto;padding:0 1.5rem;text-align:center}
  .upload-zone{border:2px dashed var(--border);border-radius:20px;padding:3rem 2rem;cursor:pointer;transition:all 0.2s;background:var(--green-pale);position:relative}
  .upload-zone:hover,.upload-zone.drag-over{border-color:var(--green-mid);background:var(--green-light)}
  .upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .upload-icon{font-size:2.5rem;margin-bottom:1rem}
  .upload-zone h2{font-family:'DM Serif Display',serif;font-size:1.3rem;font-weight:400;color:var(--ink);margin-bottom:0.4rem}
  .upload-zone p{font-size:0.85rem;color:var(--ink3)}
  .upload-hint{font-size:0.8rem;color:var(--ink3);margin-top:1.25rem;line-height:1.6}
  .upload-hint strong{color:var(--ink2)}
  #error-box{display:none;max-width:500px;margin:1.5rem auto 0;padding:1rem 1.25rem;background:#fff5f5;border:1.5px solid #fcc;border-radius:12px;font-size:0.85rem;color:#a00;text-align:left}

  /* LOADING */
  #loading-screen{display:none;text-align:center;padding:4rem 2rem;max-width:400px;margin:0 auto}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loading-screen p{color:var(--ink3);font-size:0.9rem}

  /* PICKER */
  #picker-screen{display:none;max-width:700px;margin:0 auto;padding:2.5rem 1.5rem 3rem;overflow:visible}
  .top-bar{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;flex-wrap:wrap}
  .file-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--green-light);border:1px solid var(--border);border-radius:20px;font-size:0.8rem;color:var(--green);font-weight:500;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .picker-label{font-size:0.75rem;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.75rem}
  .search-wrap{position:relative;margin-bottom:1rem}
  .search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none}
  #search{width:100%;padding:0.75rem 1rem 0.75rem 2.75rem;border:1.5px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--ink);background:var(--white);outline:none;transition:border-color 0.2s}
  #search:focus{border-color:var(--green-mid)}
  #search::placeholder{color:var(--ink3)}
  .player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;width:100%}
  .player-btn{padding:0.6rem 0.9rem;border:1.5px solid var(--border);border-radius:10px;background:var(--white);color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:0.875rem;cursor:pointer;text-align:left;transition:all 0.15s;line-height:1.3;width:100%;word-break:break-word}
  .player-btn:hover{border-color:var(--green-mid);background:var(--green-pale);color:var(--green)}
  .player-btn.active-player{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:500}
  .player-btn.hidden{display:none}

  /* CAL PANEL */
  #cal-panel{display:none;max-width:700px;margin:0 auto;padding:0 1.5rem 3rem;animation:fadeUp 0.3s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .panel-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
  .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--ink3);font-size:0.85rem;cursor:pointer;background:none;border:none;padding:0;font-family:'DM Sans',sans-serif}
  .back-btn:hover{color:var(--green)}
  .player-header{background:var(--green-light);border:1.5px solid var(--border);border-radius:16px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
  .player-avatar{width:44px;height:44px;border-radius:50%;background:var(--green);color:white;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.1rem;flex-shrink:0}
  .player-info h2{font-family:'DM Serif Display',serif;font-size:1.3rem;font-weight:400;color:var(--ink)}
  .player-info p{font-size:0.85rem;color:var(--ink3);margin-top:2px}
  .header-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:0.55rem 1rem;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.15s;text-decoration:none;border:none}
  .btn-primary{background:var(--green);color:white}
  .btn-primary:hover{background:#145a3d}
  .btn-gcal{background:white;color:#1a73e8;border:1.5px solid #c5d8fc;gap:7px}
  .btn-gcal:hover{background:#f0f5ff}
  .gcal-hint{display:none;margin-top:1rem;background:#f0f5ff;border:1.5px solid #c5d8fc;border-radius:12px;padding:1rem 1.25rem;font-size:0.82rem;color:#1a4a8a;line-height:1.7}
  .gcal-hint p{margin-bottom:0.4rem}
  .gcal-hint ol{margin:0.25rem 0 0 1.1rem}
  .gcal-hint li{margin-bottom:0.2rem}
  .gcal-hint .note{font-size:0.78rem;color:#4a6a9a;margin-top:0.6rem}
  .month-block{margin-bottom:1.5rem}
  .month-title{font-size:0.7rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border)}
  .session-row{display:flex;align-items:center;gap:1rem;padding:0.75rem 0;border-bottom:1px solid var(--border)}
  .session-row:last-child{border-bottom:none}
  .session-date{min-width:52px;text-align:center;flex-shrink:0}
  .session-date .day-num{font-family:'DM Serif Display',serif;font-size:1.5rem;font-weight:400;line-height:1;color:var(--green)}
  .session-date .day-name{font-size:0.7rem;color:var(--ink3);text-transform:uppercase;letter-spacing:0.05em}
  .session-divider{width:1px;height:32px;background:var(--border);flex-shrink:0}
  .session-info{flex:1}
  .session-time{font-size:0.95rem;font-weight:500;color:var(--ink)}
  .session-others{font-size:0.8rem;color:var(--ink3);margin-top:2px}
  .session-badge{font-size:0.7rem;padding:3px 8px;background:var(--green-light);color:var(--green);border-radius:20px;font-weight:500;white-space:nowrap}
  footer{text-align:center;padding:2rem;color:var(--ink3);font-size:0.8rem;border-top:1px solid var(--border);margin-top:2rem}

  /* NEW CALENDAR inline btn (picker + cal panel) */
  .new-cal-inline{background:none;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.8rem;color:var(--ink3);cursor:pointer;padding:5px 12px;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s}
  .new-cal-inline:hover{border-color:var(--green-mid);color:var(--green);background:var(--green-pale)}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <span class="shuttle-icon">🏸</span>
    <h1>Bàdminton — Calendari</h1>
    <p id="hero-subtitle"></p>
  </div>
  <div class="hero-bar">
    <button class="new-cal-btn-hero" id="new-cal-hero" onclick="promptNewCalendar()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v9M5 4l3-3 3 3M2 11v1a2 2 0 002 2h8a2 2 0 002-2v-1"/></svg>
      <span id="new-cal-hero-label"></span>
    </button>
    <div class="lang-toggle">
      <button class="lang-btn" id="btn-ca" onclick="setLang('ca')">CA</button>
      <button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button>
    </div>
  </div>
</div>

<!-- hidden file input for "load new calendar" -->
<input type="file" id="new-file-input" accept=".xlsx,.xls" style="display:none">

<div id="upload-screen">
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept=".xlsx,.xls">
    <div class="upload-icon">📂</div>
    <h2 id="upload-title"></h2>
    <p id="upload-sub"></p>
  </div>
  <p class="upload-hint" id="upload-hint"></p>
  <div id="error-box"></div>
</div>

<div id="loading-screen">
  <div class="spinner"></div>
  <p id="loading-text"></p>
</div>

<div id="picker-screen">
  <div class="top-bar">
    <div class="file-badge">📄 <span id="file-name"></span></div>
    <button class="new-cal-inline" onclick="promptNewCalendar()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v9M5 4l3-3 3 3M2 11v1a2 2 0 002 2h8a2 2 0 002-2v-1"/></svg>
      <span class="new-cal-label"></span>
    </button>
  </div>
  <p class="picker-label" id="picker-label"></p>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10 10l3 3"/></svg>
    <input type="text" id="search" autocomplete="off">
  </div>
  <div class="player-grid" id="player-grid"></div>
</div>

<div id="cal-panel">
  <div class="panel-nav">
    <button class="back-btn" onclick="goBack()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 12L6 8l4-4"/></svg>
      <span id="back-label"></span>
    </button>
    <button class="new-cal-inline" onclick="promptNewCalendar()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v9M5 4l3-3 3 3M2 11v1a2 2 0 002 2h8a2 2 0 002-2v-1"/></svg>
      <span class="new-cal-label"></span>
    </button>
  </div>
  <div class="player-header">
    <div class="player-avatar" id="p-avatar"></div>
    <div class="player-info">
      <h2 id="p-name"></h2>
      <p id="p-count"></p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="downloadIcs()">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V1M5 7l3 3 3-3M2 12v1a2 2 0 002 2h8a2 2 0 002-2v-1"/></svg>
        <span id="btn-download-label"></span>
      </button>
      <button class="btn btn-gcal" onclick="toggleGcalHint()">
        <svg width="16" height="16" viewBox="0 0 48 48" fill="none"><rect x="6" y="6" width="36" height="36" rx="3" fill="white" stroke="#dadce0" stroke-width="2"/><rect x="6" y="14" width="36" height="4" fill="#4285f4"/><line x1="16" y1="6" x2="16" y2="18" stroke="#4285f4" stroke-width="3" stroke-linecap="round"/><line x1="32" y1="6" x2="32" y2="18" stroke="#4285f4" stroke-width="3" stroke-linecap="round"/><text x="24" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a73e8" font-family="sans-serif">G</text></svg>
        Google Calendar
      </button>
    </div>
  </div>

  <div class="gcal-hint" id="gcal-hint">
    <p id="gcal-title"></p>
    <ol id="gcal-steps"></ol>
    <p class="note" id="gcal-note-overwrite"></p>
    <p class="note" id="gcal-note-ios"></p>
  </div>

  <div id="session-list"></div>
</div>

<footer id="footer-text"></footer>

<script>
// ── TRANSLATIONS ──
const T = {
  ca: {
    heroSubtitle: 'Puja el fitxer Excel per generar els calendaris de tots els jugadors',
    heroLoaded: (n,f,t) => `${n} jugadors · ${f} – ${t}`,
    uploadTitle: 'Puja el calendari Excel',
    uploadSub: 'Fes clic o arrossega el fitxer aquí',
    uploadHint: 'Format esperat: dates a la <strong>columna B</strong>, franges horàries (p.ex. 19:30, 20:15…) a la primera fila de cada bloc setmanal.',
    loading: 'Llegint el fitxer…',
    newCalendar: 'Nou calendari',
    pickerLabel: 'Selecciona el teu nom',
    searchPlaceholder: 'Busca el teu nom…',
    back: 'Tornar',
    downloadBtn: 'Descarregar .ics',
    sessionCount: (n,m,y) => `${n} sessions · ${m} ${y}`,
    with: 'Amb', noPartner: 'Sense parella assignada', court: 'Pista',
    gcalTitle: '<strong>Com afegir a Google Calendar (i sobreescriure si canvia):</strong>',
    gcalSteps: [
      'Fes clic a <strong>Descarregar .ics</strong> per baixar el fitxer',
      'Obre <a href="https://calendar.google.com" target="_blank" style="color:#1a73e8">calendar.google.com</a> → icona ⚙️ → <strong>Configuració</strong>',
      'Al menú esquerre: <strong>Importa i exporta</strong> → <strong>Importa</strong>',
      'Selecciona el fitxer <code>.ics</code> descarregat i prem <strong>Importar</strong>'
    ],
    gcalOverwrite: '🔄 <strong>Si el calendari canvia</strong>, torna a descarregar l\'arxiu i repeteix la importació — Google Calendar detectarà els mateixos events (per ID) i els <strong>actualitzarà automàticament</strong> sense duplicar-los.',
    gcalIos: '📱 A l\'iPhone o iPad, simplement obre el fitxer <code>.ics</code> i prem <strong>Afegir tots</strong> — si ja tenies els events importats anteriorment, els <strong>sobreescriurà automàticament</strong> gràcies al mateix ID, sense duplicats.',
    footer: 'Bàdminton — Generat automàticament a partir del fitxer Excel',
    errorEmpty: 'No s\'han trobat sessions al fitxer. Comprova que el format sigui el correcte.',
    months: ['Gener','Febrer','Març','Abril','Maig','Juny','Juliol','Agost','Setembre','Octubre','Novembre','Desembre'],
    days: ['Dg','Dl','Dt','Dc','Dj','Dv','Ds'],
    icsCalName: n => `Bàdminton ${n}`,
    icsDesc: o => o.length ? 'Amb: '+o.join(', ') : '',
  },
  es: {
    heroSubtitle: 'Sube el archivo Excel para generar los calendarios de todos los jugadores',
    heroLoaded: (n,f,t) => `${n} jugadores · ${f} – ${t}`,
    uploadTitle: 'Sube el calendario Excel',
    uploadSub: 'Haz clic o arrastra el archivo aquí',
    uploadHint: 'Formato esperado: fechas en la <strong>columna B</strong>, franjas horarias (ej. 19:30, 20:15…) en la primera fila de cada bloque semanal.',
    loading: 'Leyendo el archivo…',
    newCalendar: 'Nuevo calendario',
    pickerLabel: 'Selecciona tu nombre',
    searchPlaceholder: 'Busca tu nombre…',
    back: 'Volver',
    downloadBtn: 'Descargar .ics',
    sessionCount: (n,m,y) => `${n} sesiones · ${m} ${y}`,
    with: 'Con', noPartner: 'Sin pareja asignada', court: 'Pista',
    gcalTitle: '<strong>Cómo añadir a Google Calendar (y sobreescribir si cambia):</strong>',
    gcalSteps: [
      'Haz clic en <strong>Descargar .ics</strong> para bajar el archivo',
      'Abre <a href="https://calendar.google.com" target="_blank" style="color:#1a73e8">calendar.google.com</a> → icono ⚙️ → <strong>Configuración</strong>',
      'En el menú izquierdo: <strong>Importar y exportar</strong> → <strong>Importar</strong>',
      'Selecciona el archivo <code>.ics</code> descargado y pulsa <strong>Importar</strong>'
    ],
    gcalOverwrite: '🔄 <strong>Si el calendario cambia</strong>, vuelve a descargar el archivo y repite la importación — Google Calendar detectará los mismos eventos (por ID) y los <strong>actualizará automáticamente</strong> sin duplicarlos.',
    gcalIos: '📱 En iPhone o iPad, simplemente abre el archivo <code>.ics</code> y pulsa <strong>Añadir todos</strong> — si ya tenías los eventos importados anteriormente, los <strong>sobreescribirá automáticamente</strong> gracias al mismo ID, sin duplicados.',
    footer: 'Bàdminton — Generado automáticamente a partir del archivo Excel',
    errorEmpty: 'No se han encontrado sesiones en el archivo. Comprueba que el formato sea el correcto.',
    months: ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],
    days: ['Do','Lu','Ma','Mi','Ju','Vi','Sá'],
    icsCalName: n => `Bádminton ${n}`,
    icsDesc: o => o.length ? 'Con: '+o.join(', ') : '',
  }
};

const LS_SESSIONS = 'badminton-sessions';
const LS_PLAYER  = 'badminton-player';
const LS_FILE    = 'badminton-filename';
const LS_LANG    = 'badminton-lang';

let lang = 'ca';
let SESSIONS = [];
let currentPlayer = null;

// ── LANGUAGE ──
function setLang(l) {
  lang = l;
  try { localStorage.setItem(LS_LANG, l); } catch(e) {}
  document.documentElement.lang = l;
  document.getElementById('btn-ca').classList.toggle('active', l === 'ca');
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  applyTranslations();
}

function applyTranslations() {
  const t = T[lang];
  if (!SESSIONS.length) {
    document.getElementById('hero-subtitle').textContent = t.heroSubtitle;
  } else {
    const dates = SESSIONS.map(s => s.date).sort();
    document.getElementById('hero-subtitle').textContent =
      t.heroLoaded(new Set(SESSIONS.map(s=>s.name)).size, formatDate(dates[0]), formatDate(dates[dates.length-1]));
  }
  document.getElementById('upload-title').textContent = t.uploadTitle;
  document.getElementById('upload-sub').textContent = t.uploadSub;
  document.getElementById('upload-hint').innerHTML = t.uploadHint;
  document.getElementById('loading-text').textContent = t.loading;
  document.getElementById('picker-label').textContent = t.pickerLabel;
  document.getElementById('search').placeholder = t.searchPlaceholder;
  document.getElementById('back-label').textContent = t.back;
  document.getElementById('btn-download-label').textContent = t.downloadBtn;
  document.getElementById('footer-text').textContent = t.footer;
  document.getElementById('gcal-title').innerHTML = t.gcalTitle;
  const ol = document.getElementById('gcal-steps');
  ol.innerHTML = '';
  t.gcalSteps.forEach(s => { const li = document.createElement('li'); li.innerHTML = s; ol.appendChild(li); });
  document.getElementById('gcal-note-overwrite').innerHTML = t.gcalOverwrite;
  document.getElementById('gcal-note-ios').innerHTML = t.gcalIos;
  document.getElementById('new-cal-hero-label').textContent = t.newCalendar;
  document.querySelectorAll('.new-cal-label').forEach(el => el.textContent = t.newCalendar);
  if (currentPlayer) renderPanel(currentPlayer);
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getDate()} ${T[lang].months[d.getMonth()]} ${d.getFullYear()}`;
}

// ── STORAGE ──
function saveToStorage(sessions, filename, player) {
  try {
    localStorage.setItem(LS_SESSIONS, JSON.stringify(sessions));
    localStorage.setItem(LS_FILE, filename || '');
    localStorage.setItem(LS_PLAYER, player || '');
  } catch(e) { console.warn('localStorage full or unavailable', e); }
}

function loadFromStorage() {
  try {
    const raw = localStorage.getItem(LS_SESSIONS);
    if (!raw) return null;
    const sessions = JSON.parse(raw);
    if (!Array.isArray(sessions) || !sessions.length) return null;
    return {
      sessions,
      filename: localStorage.getItem(LS_FILE) || '',
      player: localStorage.getItem(LS_PLAYER) || ''
    };
  } catch(e) { return null; }
}

function clearStorage() {
  try {
    localStorage.removeItem(LS_SESSIONS);
    localStorage.removeItem(LS_FILE);
    localStorage.removeItem(LS_PLAYER);
  } catch(e) {}
}

// ── SCREENS ──
function showOnly(id) {
  ['upload-screen','loading-screen','picker-screen','cal-panel'].forEach(s =>
    document.getElementById(s).style.display = s === id ? 'block' : 'none');
  // Show "new calendar" button in hero only when data is loaded
  const hasData = SESSIONS.length > 0;
  const heroBtn = document.getElementById('new-cal-hero');
  if (hasData && id !== 'upload-screen') heroBtn.classList.add('visible');
  else heroBtn.classList.remove('visible');
}

// ── FILE UPLOAD ──
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });
document.getElementById('file-input').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
document.getElementById('new-file-input').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); e.target.value = ''; });

function promptNewCalendar() {
  document.getElementById('new-file-input').click();
}

function handleFile(file) {
  document.getElementById('error-box').style.display = 'none';
  showOnly('loading-screen');
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const sessions = parseExcel(new Uint8Array(ev.target.result));
      if (!sessions.length) throw new Error(T[lang].errorEmpty);
      SESSIONS = sessions;
      currentPlayer = null;
      saveToStorage(sessions, file.name, '');
      document.getElementById('file-name').textContent = file.name;
      const dates = sessions.map(s => s.date).sort();
      document.getElementById('hero-subtitle').textContent =
        T[lang].heroLoaded(new Set(sessions.map(s=>s.name)).size, formatDate(dates[0]), formatDate(dates[dates.length-1]));
      buildPlayerGrid();
      showOnly('picker-screen');
    } catch(e) {
      showOnly('upload-screen');
      const eb = document.getElementById('error-box');
      eb.textContent = '⚠️ ' + e.message;
      eb.style.display = 'block';
    }
  };
  reader.onerror = () => showOnly('upload-screen');
  reader.readAsArrayBuffer(file);
}

// ── EXCEL PARSER ──
function parseExcel(data) {
  const wb = XLSX.read(data, { type: 'array', cellDates: true });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:null, raw:false });
  const rawRows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header:1, defval:null, raw:true });
  const TIME_COLS = [2,6,10,14];
  const out = [];
  let curTimes = [];
  const MON = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

  function isTime(v) { return v!==null&&v!==undefined&&/^\d{1,2}:\d{2}(:\d{2})?$/.test(String(v).trim()); }
  function normalizeTime(v) { const m=String(v).trim().match(/^(\d{1,2}):(\d{2})/); return m?`${m[1].padStart(2,'0')}:${m[2]}`:null; }
  function parseAnyDate(raw, fmt) {
    if (raw instanceof Date && !isNaN(raw)) return raw;
    if (typeof raw==='number'&&raw>40000) { const d=XLSX.SSF.parse_date_code(raw); if(d) return new Date(d.y,d.m-1,d.d); }
    for (const val of [fmt,raw]) {
      if (val===null||val===undefined) continue;
      const s=String(val).trim();
      if (!s||isTime(s)||/^\d{1,2}(\.\d+)?$/.test(s)) continue;
      let m;
      m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return new Date(+m[1],+m[2]-1,+m[3]);
      m=s.match(/^(\d{1,2})[- ]([A-Za-z]{3})[- ](\d{2,4})$/);
      if(m){const mo=MON[m[2].toLowerCase()];if(mo!==undefined){let yr=+m[3];if(yr<100)yr+=2000;return new Date(yr,mo,+m[1]);}}
      m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if(m) return new Date(+m[3],+m[2]-1,+m[1]);
      const d=new Date(s); if(!isNaN(d)&&d.getFullYear()>2000) return d;
    }
    return null;
  }

  let i=0;
  while(i<rows.length){
    const row=rows[i],rawRow=rawRows[i];
    if(isTime(row[2])||isTime(rawRow[2])){
      curTimes=[];
      TIME_COLS.forEach(tc=>{const tv=isTime(row[tc])?row[tc]:(isTime(rawRow[tc])?rawRow[tc]:null);if(tv){const t=normalizeTime(tv);if(t)curTimes.push({col:tc,time:t});}});
      i++;continue;
    }
    const dateVal=parseAnyDate(rawRow[1],row[1]);
    if(dateVal){
      const prows=[row];let j=i+1;
      while(j<rows.length){
        if(parseAnyDate(rawRows[j][1],rows[j][1]))break;
        if(isTime(rows[j][2])||isTime(rawRows[j][2]))break;
        prows.push(rows[j]);j++;
      }
      curTimes.forEach(({col,time})=>{
        const names=[];
        prows.forEach(pr=>{[col,col+2].forEach(c=>{const v=pr[c];if(v&&String(v).trim()&&!isTime(String(v)))names.push(String(v).trim());});});
        names.forEach(name=>out.push({date:`${dateVal.getFullYear()}-${String(dateVal.getMonth()+1).padStart(2,'0')}-${String(dateVal.getDate()).padStart(2,'0')}`,y:dateVal.getFullYear(),m:dateVal.getMonth(),d:dateVal.getDate(),time,name}));
      });
      i=j;continue;
    }
    i++;
  }
  return out;
}

// ── PLAYER GRID ──
function buildPlayerGrid() {
  const players=[...new Set(SESSIONS.map(s=>s.name))].sort();
  const grid=document.getElementById('player-grid');
  grid.innerHTML='';
  players.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='player-btn';btn.textContent=name;btn.dataset.name=name.toLowerCase();
    if(name===currentPlayer)btn.classList.add('active-player');
    btn.onclick=()=>selectPlayer(name);
    grid.appendChild(btn);
  });
  const search=document.getElementById('search');
  search.value='';
  search.oninput=function(){const q=this.value.toLowerCase();document.querySelectorAll('.player-btn').forEach(b=>b.classList.toggle('hidden',!b.dataset.name.includes(q)));};
}

function selectPlayer(name) {
  currentPlayer=name;
  try { localStorage.setItem(LS_PLAYER, name); } catch(e) {}
  renderPanel(name);
  document.getElementById('picker-screen').style.display='none';
  document.getElementById('cal-panel').style.display='block';
  document.getElementById('gcal-hint').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

function goBack() {
  document.getElementById('cal-panel').style.display='none';
  document.getElementById('picker-screen').style.display='block';
  // re-highlight active player in grid
  document.querySelectorAll('.player-btn').forEach(b=>b.classList.toggle('active-player',b.dataset.name===(currentPlayer||'').toLowerCase()));
}

// ── RENDER PANEL ──
function initials(name){return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}

function renderPanel(name) {
  const t=T[lang];
  const mine=SESSIONS.filter(s=>s.name===name);
  document.getElementById('p-avatar').textContent=initials(name);
  document.getElementById('p-name').textContent=name;
  const months=[...new Set(mine.map(s=>t.months[s.m]))];
  document.getElementById('p-count').textContent=t.sessionCount(mine.length,months.join(' – '),mine[0]?.y||'');
  const byMonth={};
  mine.forEach(s=>{const mk=`${s.y}-${s.m}`;if(!byMonth[mk])byMonth[mk]={y:s.y,m:s.m,sessions:[]};byMonth[mk].sessions.push(s);});
  const list=document.getElementById('session-list');
  list.innerHTML='';
  Object.values(byMonth).sort((a,b)=>a.y-b.y||a.m-b.m).forEach(({y,m,sessions})=>{
    const block=document.createElement('div');block.className='month-block';
    const title=document.createElement('div');title.className='month-title';title.textContent=`${t.months[m]} ${y}`;block.appendChild(title);
    sessions.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).forEach(s=>{
      const d=new Date(s.date+'T00:00:00');
      const others=SESSIONS.filter(x=>x.date===s.date&&x.time===s.time&&x.name!==name).map(x=>x.name);
      const row=document.createElement('div');row.className='session-row';
      row.innerHTML=`
        <div class="session-date"><div class="day-num">${d.getDate()}</div><div class="day-name">${t.days[d.getDay()]}</div></div>
        <div class="session-divider"></div>
        <div class="session-info">
          <div class="session-time">${s.time}h</div>
          <div class="session-others">${others.length?t.with+': '+others.join(', '):t.noPartner}</div>
        </div>
        <div class="session-badge">${t.court}</div>`;
      block.appendChild(row);
    });
    list.appendChild(block);
  });
}

// ── ICS ──
const VTIMEZONE=`BEGIN:VTIMEZONE\r\nTZID:Europe/Madrid\r\nBEGIN:STANDARD\r\nTZOFFSETFROM:+0200\r\nTZOFFSETTO:+0100\r\nTZNAME:CET\r\nDTSTART:19701025T030000\r\nRRULE:FREQ=YEARLY;BYDAY=-1SU;BYMONTH=10\r\nEND:STANDARD\r\nBEGIN:DAYLIGHT\r\nTZOFFSETFROM:+0100\r\nTZOFFSETTO:+0200\r\nTZNAME:CEST\r\nDTSTART:19700329T020000\r\nRRULE:FREQ=YEARLY;BYDAY=-1SU;BYMONTH=3\r\nEND:DAYLIGHT\r\nEND:VTIMEZONE\r\n`;

function buildIcs(name) {
  const t=T[lang];
  const mine=SESSIONS.filter(s=>s.name===name);
  const pad=n=>String(n).padStart(2,'0');
  let ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Badminton//EN\r\nCALSCALE:GREGORIAN\r\nX-WR-CALNAME:${t.icsCalName(name)}\r\nX-WR-TIMEZONE:Europe/Madrid\r\n`;
  ics+=VTIMEZONE;
  mine.forEach(s=>{
    const d=new Date(s.date+'T00:00:00');
    const ds=`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
    const[hh,mm]=s.time.split(':').map(Number);
    const dtstart=`${ds}T${pad(hh)}${pad(mm)}00`;
    const endTotal=hh*60+mm+45;
    const dtend=`${ds}T${pad(Math.floor(endTotal/60))}${pad(endTotal%60)}00`;
    const others=SESSIONS.filter(x=>x.date===s.date&&x.time===s.time&&x.name!==name).map(x=>x.name);
    const uid=`badminton-${ds}-${pad(hh)}${pad(mm)}-${name.replace(/\s+/g,'').toLowerCase()}@badminton`;
    ics+=`BEGIN:VEVENT\r\nUID:${uid}\r\nSUMMARY:Bàdminton 🏸\r\nDTSTART;TZID=Europe/Madrid:${dtstart}\r\nDTEND;TZID=Europe/Madrid:${dtend}\r\nDESCRIPTION:${t.icsDesc(others)}\r\nEND:VEVENT\r\n`;
  });
  return ics+'END:VCALENDAR';
}

function toggleGcalHint(){const h=document.getElementById('gcal-hint');h.style.display=h.style.display==='block'?'none':'block';}

function downloadIcs(){
  const ics=buildIcs(currentPlayer);
  const encoded='data:text/calendar;charset=utf-8,'+encodeURIComponent(ics);
  const a=document.createElement('a');
  a.href=encoded;
  a.download=`badminton-${currentPlayer.replace(/\s+/g,'_')}.ics`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// ── INIT ──
(function init() {
  try { const s=localStorage.getItem(LS_LANG); if(s==='ca'||s==='es') lang=s; } catch(e) {}
  setLang(lang);

  const saved=loadFromStorage();
  if (saved) {
    SESSIONS=saved.sessions;
    document.getElementById('file-name').textContent=saved.filename;
    const dates=SESSIONS.map(s=>s.date).sort();
    document.getElementById('hero-subtitle').textContent=
      T[lang].heroLoaded(new Set(SESSIONS.map(s=>s.name)).size,formatDate(dates[0]),formatDate(dates[dates.length-1]));
    buildPlayerGrid();
    if (saved.player && SESSIONS.some(s=>s.name===saved.player)) {
      currentPlayer=saved.player;
      renderPanel(saved.player);
      showOnly('cal-panel');
    } else {
      showOnly('picker-screen');
    }
  } else {
    showOnly('upload-screen');
  }
})();
</script>
